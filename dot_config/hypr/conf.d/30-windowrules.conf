windowrule {
    name = browsers-pip-modals
    match:title = $pipTitles
    float = on
    pin = on
    group = deny
    keep_aspect_ratio = on
    no_initial_focus = on
    min_size = 240 135
    max_size = 640 360
}

windowrule {
    name = xdg-portal-modals
    match:class = ^(xdg-desktop-portal-gtk)$
    float = on
    center = on
    stay_focused = on
    group = deny
    keep_aspect_ratio = on
    suppress_event = maximize, fullscreen
    size = (monitor_w*0.55) (monitor_h*0.65)
}

