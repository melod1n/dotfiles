# ==============================================================================
# Window rules
# ==============================================================================

# ------------------------------------------------------------------------------
# Modal dialogs
# ------------------------------------------------------------------------------
windowrule {
    name = all-modals
    match:modal = true
    force_rgbx = on
    float = on
    center = on
    dim_around = on
    suppress_event = maximize
    suppress_event = fullscreen
}

windowrule = match:class ^(dialog)$, float on, center on
windowrule = match:title ^(.*[pP]opup.*)$, stay_focused on
windowrule = match:class ^(.*)$, suppress_event maximize

windowrule {
    name = localsend-modal
    match:class = localsend
    float = on
    center = on
    size = 900 720
}

windowrule {
    name = telegram-modals
    match:class = $telegramClasses
    match:modal = true
    float = on
    center = on
    size = 900 720
    suppress_event = maximize
    suppress_event = fullscreen
}

windowrule {
    name = blueman-modal
    match:class = ^(blueman-manager)$
    float = on
    center = on
    size = (monitor_w*0.3) (monitor_h*0.4)
}

windowrule {
    name = jetbrains-welcome-modal
    match:title = $jetbrainsWelcomeTitles
    float = on
    center = on
    size = (monitor_w*0.4) (monitor_h*0.4)
}

windowrule {
    name = bitwarden-modal
    match:class = ^(Bitwarden)$
    float = on
    center = on
    size = (monitor_w*0.4) (monitor_h*0.4)
}

windowrule {
    name = auth-modals-classes
    match:class = $authDialogClasses
    float = on
    center = on
    stay_focused = on
    dim_around = on
    group = deny
    keep_aspect_ratio = on
    size = 520 260
}

