# ==============================================================================
# Window rules
# ==============================================================================

# ------------------------------------------------------------------------------
# Modal dialogs
# ------------------------------------------------------------------------------
# # Global rule for real modal=true windows. This fixes dialogs being tiled or losing focus.
windowrule = float on, center on, dim_around on, match:modal true

windowrule = match:class ^(dialog)$, float on, center on
windowrule = match:title ^(.*[pP]opup.*)$, stay_focused on
windowrule = match:class ^(.*)$, suppress_event maximize

windowrule {
    name = all-modals
    match:modal = true
    force_rgbx = on
    float = on
    center = on
    dim_around = on
    suppress_event = maximize
    suppress_event = fullscreen
}

windowrule {
    name = localsend-modal
    match:class = localsend
    float = on
    center = on
    size = 900 720
}

windowrule {
    name = telegram-modals
    match:class = $telegramClasses
    match:modal = true
    float = on
    center = on
    size = 900 720
    suppress_event = maximize
    suppress_event = fullscreen
}

windowrule {
    name = telegram
    match:class = $telegramClasses
    match:modal = false
    float = on
    center = on
    center = on
    size = 1300 740
}

windowrule {
    name = yandex-music
    match:class = ^(YandexMusic)$
    float = on
    center = on
    center = on
    size = 1300 740
}

windowrule {
    name = blueman-modal
    match:class = ^(blueman-manager)$
    float = on
    center = on
    size = (monitor_w*0.3) (monitor_h*0.4)
}

windowrule {
    name = jetbrains-welcome-modal
    match:title = $jetbrainsWelcomeTitles
    float = on
    center = on
    size = (monitor_w*0.4) (monitor_h*0.4)
}

windowrule {
    name = bitwarden-modal
    match:class = ^(Bitwarden)$
    float = on
    center = on
    size = (monitor_w*0.4) (monitor_h*0.4)
}

# # File choosers / upload dialogs. These get a sane desktop size.
windowrule = match:title $fileChooserTitles, float on
windowrule = match:title $fileChooserTitles, center on
windowrule = match:title $fileChooserTitles, size (monitor_w*0.55) (monitor_h*0.65)
windowrule = match:title $fileChooserTitles, stay_focused on
windowrule = match:title $fileChooserTitles, suppress_event maximize
windowrule = match:title $fileChooserTitles, suppress_event fullscreen

# # Portals / GTK native file picker.
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float on
windowrule = match:class ^(xdg-desktop-portal-gtk)$, center on
windowrule = match:class ^(xdg-desktop-portal-gtk)$, size (monitor_w*0.55) (monitor_h*0.65)
windowrule = match:class ^(xdg-desktop-portal-gtk)$, stay_focused on
windowrule = match:class ^(xdg-desktop-portal-gtk)$, suppress_event maximize
windowrule = match:class ^(xdg-desktop-portal-gtk)$, suppress_event fullscreen

windowrule = match:class ^(org.gtk.FileChooserNative)$, float on
windowrule = match:class ^(org.gtk.FileChooserNative)$, center on
windowrule = match:class ^(org.gtk.FileChooserNative)$, size (monitor_w*0.55) (monitor_h*0.65)
windowrule = match:class ^(org.gtk.FileChooserNative)$, stay_focused on
windowrule = match:class ^(org.gtk.FileChooserNative)$, suppress_event maximize
windowrule = match:class ^(org.gtk.FileChooserNative)$, suppress_event fullscreen

# # ------------------------------------------------------------------------------
# # Chrome/Chromium/Brave/Firefox PiP
# # ------------------------------------------------------------------------------
# # Do not force exact size: browser should keep its own PiP size.
windowrule = match:class $browserClasses, match:title $pipTitles, float on
windowrule = match:class $browserClasses, match:title $pipTitles, pin on
windowrule = match:class $browserClasses, match:title $pipTitles, group deny
windowrule = match:class $browserClasses, match:title $pipTitles, keep_aspect_ratio on
windowrule = match:class $browserClasses, match:title $pipTitles, no_initial_focus on
windowrule = match:class $browserClasses, match:title $pipTitles, min_size 240 135
windowrule = match:class $browserClasses, match:title $pipTitles, max_size 640 360

# # ------------------------------------------------------------------------------
# # Android Emulator / weird tool windows
# # ------------------------------------------------------------------------------
# # Keep them floating and out of groups. Adjust/remove size if your emulator reports a sane size.
# windowrule = match:class $androidFloatingClasses, float on
# #windowrule = match:class $androidFloatingClasses, group deny
# windowrule = match:class $androidFloatingClasses, keep_aspect_ratio on
# windowrule = match:class $androidFloatingClasses, persistent_size on
# windowrule = match:class $androidFloatingClasses, border_size 1, no_shadow on, no_blur on

# windowrule = match:class ^(krunner)$, float on, center on, stay_focused on

# # Authentication / polkit dialogs must float and stay readable.
windowrule = match:class $authDialogClasses, float on
windowrule = match:class $authDialogClasses, center on
windowrule = match:class $authDialogClasses, size 520 260
windowrule = match:class $authDialogClasses, stay_focused on
windowrule = match:class $authDialogClasses, dim_around on
windowrule = match:title $authDialogTitles, float on
windowrule = match:title $authDialogTitles, center on
windowrule = match:title $authDialogTitles, stay_focused on
windowrule = match:title $authDialogTitles, dim_around on