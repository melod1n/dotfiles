windowrule {
    name = android-emulator-modals
    match:class = $androidFloatingClasses
    float = on
    keep_aspect_ratio = on
    persistent_size = on
    border_size = 1
    no_shadow = on
    no_blur = on
}

windowrule {
    name = telegram
    match:class = $telegramClasses
    match:modal = false
    float = on
    center = on
    center = on
    size = 1300 740
}

windowrule {
    name = yandex-music
    match:class = ^(YandexMusic)$
    float = on
    center = on
    center = on
    size = 1300 740
}

windowrule {
    name = yazi
    match:class = yazi
    float = on
    size = 75% 75%
    center = on
}

windowrule {
    name = happ
    match:class = Happ
    float = on
    size = 1000 640
}

windowrule {
    name = kde-picker
    match:class = org.freedesktop.impl.portal.desktop.kde
    size = 1000 640
}

windowrule {
    name = rustdesk-as-modal
    match:class = ^((r|R)ustdesk)$
    float = on
    center = on
    min_size = 240 135
}