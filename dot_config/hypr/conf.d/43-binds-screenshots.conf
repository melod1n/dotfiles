# ==============================================================================
# Keybinds: screenshots / screen recording helpers
# ==============================================================================

# Print — full screen: save + copy.
bind = , Print, exec, sh -c 'dir="$HOME/Pictures/Screenshots"; mkdir -p "$dir"; file="$dir/screenshot-$(date +%Y%m%d-%H%M%S).png"; grim "$file" && wl-copy < "$file" && notify-send "Screenshot" "$file" -t 1500'

# Ctrl + Print — selected area: save + copy/freezed area helper.
bind = CTRL, Print, exec, ~/.local/bin/screenshot-freeze-area
#bind = CTRL, Print, exec, sh -c 'dir="$HOME/Pictures/Screenshots"; mkdir -p "$dir"; file="$dir/screenshot-$(date +%Y%m%d-%H%M%S).png"; grim -g "$(slurp)" "$file" && wl-copy < "$file"'

# Super + Print — selected area -> swappy editor.
bind = $mainMod, Print, exec, grim -g "$(slurp)" - | swappy -f -

bind = SHIFT, Print, exec, ~/.config/hypr/scripts/record-region-toggle.sh
bind = CTRL SHIFT, Print, exec, ~/.config/hypr/scripts/record-screen.sh
