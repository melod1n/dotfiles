# ==============================================================================
# General / Layout / Decoration / Animations
# ==============================================================================

general {
    gaps_in = 6
    gaps_out = 12
    float_gaps = 12
    border_size = 2
    resize_on_border = true
    layout = dwindle

    col.active_border = rgba(8b5cf6aa)
    col.inactive_border = rgba(313244aa)
}

dwindle {
    preserve_split = true
    precise_mouse_move = true
}

layout {
    # single_window_aspect_ratio = 4 3
    # single_window_aspect_ratio_tolerance = 0.1
}

decoration {
    rounding = 14

    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.1
    dim_special = 0.05
    dim_around = 0.4
}

animations {
    enabled = yes

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1

    animation = windows, 1, 4, easeOutQuint
    animation = windowsOut, 1, 4, easeInOutCubic, popin 80%
    animation = border, 1, 6, easeOutQuint
    animation = fade, 1, 4, easeOutQuint
    animation = workspaces, 1, 5, easeOutQuint
}
