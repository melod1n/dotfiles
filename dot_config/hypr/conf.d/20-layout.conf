# ==============================================================================
# General / Layout / Decoration / Animations
# ==============================================================================

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    layout = dwindle
}

dwindle {
    preserve_split = true
}

decoration {
    rounding = 8
}

animations {
