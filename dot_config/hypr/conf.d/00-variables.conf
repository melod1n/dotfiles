# ==============================================================================
# Variables
# ==============================================================================

$mainMod = SUPER
$mod = SUPER

$terminal = kitty
$launcher = fuzzel
$fileManager = dolphin
$browser = brave

$scriptsDir = ~/.config/hypr/scripts

# Browser/PiP classes. Check exact values with: hyprctl clients -j | jq '.[].class'
$browserClasses = ^(google-chrome|Google-chrome|chromium|Chromium|brave-browser|Brave-browser|vivaldi-stable|firefox|Firefox)$
$pipTitles = ^(Picture in picture|Picture-in-Picture|Картинка в картинке|PiP).*$

# Android Emulator / Android Studio-ish floating tools. Check exact class with: hyprctl clients
$androidFloatingClasses = ^(emulator|Emulator|Android Emulator|sun-awt-X11-XFramePeer)$

# File chooser / upload dialogs.
$fileChooserTitles = ^(Open File|Open Files|Select File|Select Files|Choose File|Choose Files|File Upload|Open Folder|Select Folder|Открыть файл|Открыть файлы|Выбор файла|Выберите файл|Выберите файлы|Выбор папки).*$

# Common authentication / polkit dialog classes.
$authDialogClasses = ^(org\.kde\.polkit\.kde-authentication-agent-1|polkit-gnome-authentication-agent-1|lxqt-policykit-agent|mate-polkit|xfce-polkit|gcr-prompter|org\.gnome\.Shell\.PortalHelper|org\.freedesktop\.impl\.portal\.desktop\.gtk)$
$authDialogTitles = ^(Authentication Required|Authenticate|Authentication|PolicyKit1 KDE Agent|Выполните аутентификацию|Аутентификация|Требуется аутентификация)$

$telegramClasses = ^(org.telegram.desktop.*|Telegram|TelegramDesktop|telegram|telegram-desktop)$

$jetbrainsWelcomeTitles = ^(Welcome to (IntelliJ IDEA|WebStorm|PyCharm|GoLand|Android Studio))$