# ==============================================================================
# Groups / window tabbing
# ==============================================================================
# Default: tabbing/groups are effectively disabled.
# Toggle at runtime: SUPER + CTRL + G.
#
# Why not only group:groupbar:enabled = false?
# Because that hides the tabs visually, but does not fully disable grouping logic.

group {
    auto_group = true
    drag_into_group = 1
    merge_groups_on_drag = true
    merge_groups_on_groupbar = true
    merge_floated_into_tiled_on_groupbar = false
    group_on_movetoworkspace = false

    groupbar {
        enabled = true
    }
}
