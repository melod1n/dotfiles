# ==============================================================================
# Autostart
# ==============================================================================

# Export current Hyprland session env into systemd/dbus activated services.
# This is important for portals, tray, file pickers and apps launched through xdg-open.
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY DISPLAY XAUTHORITY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_DESKTOP GTK_THEME QT_QPA_PLATFORMTHEME QT_WAYLAND_DISABLE_WINDOWDECORATION XCURSOR_THEME XCURSOR_SIZE SSH_AUTH_SOCK GNOME_KEYRING_CONTROL

exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets,ssh,pkcs11

exec-once = dex -a -s ~/.config/autostart/

exec-once = systemctl --user start hyprpolkitagent

exec-once = pidof hypridle || hypridle

exec-once = waybar
#exec-once = mako
exec-once = swaync
exec-once = playerctld daemon
exec-once = swaybg -c 11111b

exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

exec-once = wl-clip-persist --clipboard regular

exec-once = hyprpaper

exec-once = hyprsunset

exec-once = udiskie --automount --tray --no-notify
exec-once = systemctl --user start hyprland-session.target
exec-shutdown = systemctl --user stop hyprland-session.target
