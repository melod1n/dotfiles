# ==============================================================================
# Keybinds: apps / session / media
# ==============================================================================

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, D, exec, $launcher
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser

bind = $mainMod SHIFT, RETURN, exec, [float; center; size 1000 700] $terminal
bind = $mainMod SHIFT, D, exec, $launcher --launch-prefix=$scriptsDir/float-launch.sh
bind = $mainMod SHIFT, E, exec, [float; center; size 1200 800] $fileManager
bind = $mainMod SHIFT, B, exec, $scriptsDir/float-launch.sh $browser --new-window

bind = $mainMod, Q, killactive
bind = $mainMod, M, exec, hyprctl dispatch exit
bind = $mainMod SHIFT, R, exec, hyprctl reload

bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-

bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

bind = $mainMod, L, exec, ~/.config/hypr/scripts/lock-now.sh

bind = $mainMod, F12, exec, ~/.config/hypr/scripts/power-menu.sh