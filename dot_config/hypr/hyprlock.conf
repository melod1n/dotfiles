general {
    hide_cursor = true
}

background {
    monitor =
    path /home/meloda/Pictures/Wallpapers/lockscreen.jpg
    blur_passes = 2
    blur_size = 7
    brightness = 0.65
}

label {
    monitor =
    text = $TIME
    font_size = 64
    font_family = JetBrainsMono Nerd Font

    position = 0, 140
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    font_size = 20
    font_family = JetBrainsMono Nerd Font

    position = 0, 70
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2

    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba(ffffff33)
    inner_color = rgba(11111188)
    font_color = rgba(ffffffff)
    placeholder_text = <i>Password...</i>

    fade_on_empty = false
    rounding = 16

    position = 0, -40
    halign = center
    valign = center
}
