general {
    lock_cmd = ~/.config/hypr/scripts/lock-now.sh
    before_sleep_cmd = ~/.config/hypr/scripts/lock-now.sh
    after_sleep_cmd = hyprctl dispatch dpms on

    inhibit_sleep = 3

    ignore_dbus_inhibit = false
    ignore_systemd_inhibit = false
    ignore_wayland_inhibit = false
}

listener {
    timeout = 270
    on-timeout = hyprctl hyprsunset gamma 35
    on-resume = hyprctl hyprsunset gamma reset
    ignore_inhibit = false
}

listener {
    timeout = 300
    on-timeout = ~/.config/hypr/scripts/lock-now.sh
}

listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
    ignore_inhibit = false
}
